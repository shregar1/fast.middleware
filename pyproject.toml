[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "fastmvc-middleware"
version = "0.9.0"
description = "HTTP middleware utilities (request ID, security headers, timing, CORS/body/IP/compression) for FastMVC / Starlette apps."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "starlette>=0.27.0",
    "fastmvc_core",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "httpx>=0.24.0",
]

[project.urls]
Homepage = "https://github.com/shregar1/fastmvc"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-v --tb=short"
# Only the lightweight ``fastmvc_middleware`` tests (other files target the optional ``fastmiddleware`` package).
python_files = [
    "test_request_id_middleware.py",
    "test_security_headers.py",
    "test_timing.py",
    "test_cors_preset.py",
    "test_body_limit.py",
    "test_client_ip.py",
    "test_compression_preset.py",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
fastmvc_middleware = ["py.typed"]
